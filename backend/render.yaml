services:
  - type: web
    name: instadown-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: RAPIDAPI_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
